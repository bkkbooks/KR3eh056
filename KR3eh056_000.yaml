body:
  text: 正文痢為病發秋天古名腸澼又名滯下今名曰痢以其下利而又不爽利也與洞瀉相別天淵四季皆有此症唯秋時此病更多金木沴濕熱煎所以秋時此症更多者蓋五行之序由春入夏為木生火火熱氣主事之時也由夏至長夏六月為火生土是為濕土主事之時熱來蒸濕合氣為暑故六月節名小暑大暑至立秋以後則土來生金濕熱當止故其節名處暑言暑氣自此止也暑氣止則熱變為涼氣而涼風至矣濕氣變為清氣而清肅下降矣如此則秋金氣旺木火自戢中土不致受邪矣若其人之肝木太旺遇金來制之而木不受制遏郁生火則熱氣不退火反剋金金氣不得清肅因之濕亦不化與熱相蒸蘊結血氣於三焦腸胃之間釀為腐穢膠黏之汁則成痢矣肝迫注故下逼肺收攝故滯塞人身肝主疏泄疏者條達而上也泄者順利而下也木氣不疏則鬱郁者草木多而壅遏也木氣太泄則暴注暴注者泄力太過之故也然使金不與木爭則泄而不斂何至滯塞哉唯當秋金收斂之令肺金不應受邪故金必與木爭木愈泄金愈收是以逼迫艱澀而成其裡急後重也白氣腐紅血潰俗以白痢為寒非也白痢只氣分之熱腐化成汁有如烈日流金爍石也今之治白痢者每用薑桂吳萸而成死證戒之戒之蓋紅白二色不分寒熱只分氣血而已陳平伯云氣調則後重自愈血和則便膿自除可謂得法病有脾治肝肺凡瀉泄之症皆出於腸胃而胃與大小腸又皆統於脾經故此痢症亦無不歸屬於脾者然其致痢之由實不責脾而責在肝肺肺金不能顧母肝木鬱而剋土以致脾王受邪但當治肝肺則脾經自治初發熱或惡寒兼疏表柴葛餐痢症初起而發熱惡寒者乃內有鬱熱外感風寒寒能閉火風能煽熱互相蒸發是生寒熱宜兼疏其表用葛根黃連黃芩湯柴胡荊芥湯或人參敗毒散加黃芩亦效三五日病歸里但治內無外駛痢證在三五日後雖有發熱惡寒等症亦由邪歸腸胃蒸發於外其責專重在內但當清理裡氣一清則外之寒熱自除不可發表反傷營衛以致津枯血竭也西醫云腸胃炎膜油腫潰痛兼中國自宋元后皆不和痢症何故腹痛何故便膿至有以便膿為虛脫以腹痛為中寒者誤人不少唯西醫云將痢症病死之人剖割視之見其腸胃發赤膜油發腫甚則潰爛乃知腹痛便膿之故矣此説似奇實正蓋油膜者脾經所屬也肝火從肝膜入膏油蒸發紅腫肺金不能利水水火蘊結在油膜中而油膜又全連腸胃是以腸胃赤腫發痛甚則潰爛與寒中洞泄迥然不同治白痢主肺氣白虎湯銀菊散輕病用銀菊散重者宜白虎湯專清肺金加杏仁厚朴桔梗以利肺氣使不收澀加白芍黃芩甘草以平肝使肝木不侮肺脾土不受克則愈如小便不利再加桑葉滑石外有寒熱者可加葛根治紅痢主肝血白頭湯守圭臬白頭翁無風獨搖有風不動一莖直上能引肝氣上達使不下迫則後重自除芩連黃柏大瀉肝火火清血靜則紅痢自止此仲景大法也余嘗用金花湯加炒荊芥地榆歸尾檳榔杏仁白芍青蒿亦是白頭翁湯之意閉迫甚不得通生大黃暫一攻世傳黃連黃芩生大黃吳茱萸為治痢霹靂散暫用多效然痢症是蘊釀糾結之邪非剽劫所能除甚有久服大黃而反致死者津血被奪故也唯遇閉迫太甚求通不得者於各藥之中暫加大黃一攻亦常得效喜開達杏桔蘇藁荷菊葛麻扶內閉者宜開下迫者宜達開之當從肺治宜桔梗杏仁貝母以制肺氣使不收澀也達之當伸肝鬱宜白頭翁柴胡皆莖直上能升清陽唯二藥鮮真者余每用荷莖黃菊老蘇梗葛根天麻代之皆能申木鬱而解下迫也喉痛嗆是亦恆證多死藥難憑痢證喉痛氣嗆喘逆者名奇恆利以其異於常痢也是火逆攻肺有立時敗絶之勢仲景云急下之宜大承氣湯然病此者多死少生若噤口津液傷不速治腐胃腸諸病不食皆是中寒唯痢證噤口不食是腸胃熱灼津液不升舌乾咽澀食不得下西醫言人之食皆胃津吸之也此症胃津灼枯是以噤不食喻嘉言倉廩湯循名失實朱丹溪石蓮湯依稀倣佛皆不知胃津用事之故也此時沃焦救焚若遲不及則腐腸爛胃而死世之用香砂橘半者不知誤殺多人試者噤口必舌上無津液但令津液蓋過舌心則食即下百驗不爽勿為舊説所誤也救胃煎開噤湯毋利水免津湯痢證嘔吐是火逆拂鬱宜三黃酒止嘔嘔止即進食此非真噤口也唯不嘔不食舌上無津是為真噤口宜救胃煎開噤湯大生津液以救腸胃凡泄皆宜利水唯痢證膠結之邪只當滑以去著不可滲利反傷津液也食已進痢未止宜分消亦利水痢症不可利水自是一定之法然既服寒涼藥後腸胃中津液已存而痢猶不止者亦可兼利小便使濕熱之邪分消而出蓋不利水者但清其腸胃也而兼利水者是兼清其膜油也且止宜潤利加滑石車前防已木通之類而不可燥利也醫者知之痢既愈當補脾喜歸地忌薑耆痢後當補脾陰宜歸地養榮湯而不當補胃陽故薑桂砂陳朮耆苓附皆非所宜唯用白芍當歸麥冬人參玉竹山藥石斛黃精山萸肉一派滋養脾陰之藥則大能補益令人肥健若休息瘀熱臟逾時發攻下良或逾時逾年而又復發名休息痢謂其已休止而又復生息也是瘀熱留伏於膜油隱慝之地仲景云宜承氣湯下之時法用黃連末調羊脂服余每用清寧丸日服八分或當歸蘆薈丸多服皆效痢太久亦變虛佐熱藥寒即祛痢本無寒證唯泄痢太久亦有轉為虛寒者故仲景有桃花湯烏梅丸以從治之不後重乃用之辨症者當慎持但虛滑之症必不後重與熱閉者有別醫者當辨之不可寒熱誤用也附方葛根黃連黃芩湯治外感發寒熱並下痢者葛根八錢黃連三錢黃芩三錢杏仁四錢研甘草一錢此仲景治協熱利下之方也凡痢證兼外感者當本此意治之用水二碗煎取一碗頓服之如有宿食者可加枳殼一錢厚朴二錢柴胡荊芥湯痢症有寒熱表裡兼治者川柴胡八錢一要真者不辛散只清香升發而已如無真者以青蒿荷葉蘇梗代之荊芥一錢半生用竹茹三錢銀花二錢連翹二錢白芍三分杏仁三分枯梗三分青木香一錢黃芩二錢甘草一錢上藥用水三茶碗先煎各味至四五沸再入荊芥煎三沸去渣溫服微汗出則外熱自退痢證亦減人參敗毒散治外感有寒兼發痢者人參羌活獨活各一錢川芎八分川柴胡三錢如毋真者以青蒿荷葉代前胡二錢桔梗二錢茯苓二錢枳殼一錢生甘草一分此方今人最尚然皆散寒利水之藥非痢症勿合之方也必加黃芩乃能清內熱再加白芍乃能平肝疏土凡痢初起而外有寒熱者亦可用此發散之用水二碗煎取一碗服之銀菊散治白痢之輕藥也銀花三錢白菊三錢連翹二錢生白芍三錢杏仁三錢研去皮尖桔梗三錢梔子二錢木香一錢牛蒡子三錢甘草一錢用水三茶碗煎取碗半服如有宿食加生大黃五錢白虎湯生石膏三錢研煅石膏三錢研甘草一錢粳米三錢再加黃芩三錢白芍三錢杏仁三錢桔梗二錢厚朴一錢方合痢證有外寒者再加葛根荊芥小便不利者再加桑皮滑石此治白痢之良方也白頭翁湯治紅痢白頭翁五錢細葉白毛一莖直上味微苦而氣清香開小黃白色花者為真白頭翁也如無真者用白薇粉葛竹茹天麻代黃柏三錢黃連三錢秦皮三錢用水二碗煎取一碗服最妙白頭翁能平木疏肝息風清火使下迫之氣條達而上也如無此味亦當仿此用藥乃能解除裡急金花湯今名黃連解毒湯治紅痢黃連三錢黃芩三錢黃柏三錢梔子三錢加杏仁三錢檳榔二錢當歸三錢地榆三錢赤芍二錢荊芥一錢生地三錢青蒿三錢甘草一錢水煎服霹靂散治痢症脹閉有宿食發嘔等症生大黃一錢黃連二錢黃芩三錢吳茱萸一錢用水二碗煎取一碗先取半碗得快利即止勿服如不快利再服一次此藥只可服一二次不可多服大承氣湯治奇恆痢生大黃二錢厚朴二錢枳殼一錢芒硝三錢先煎三味已成後入芒硝一二沸取汁服咽痛嗆略愈即止再進加減金花湯三黃酒治痢症發嘔吐者黃連一錢黃芩三錢生大黃二錢用好燒酒二碗煎成一碗徐徐咽下如不飲酒者用水一碗加酒一杯煎服徐咽嘔吐止即勿服救胃煎治噤口不食生地白芍黃連黃芩玉竹花粉各三錢杏仁三錢研桔梗二錢石膏四錢煅麥冬三錢枳殼八錢厚朴一錢甘草一錢上水三茶碗煎取碗半服必舌上有津液則進食矣開噤湯治噤口不食人參二錢麥冬三錢天冬三錢石膏三錢煅梔子三錢黃連二錢黃芩一錢黃柏一錢生地三錢白芍三錢當歸三錢射干二錢杏仁三錢研檳榔枳殼甘草各一錢花粉二錢此為治噤口痢之主方生津進食除腸胃中之炎症力量周到再加白頭翁則詳盡無遺矣歸地養榮湯當歸三錢生地三錢山藥三錢麥冬三錢白芍三錢蓮子青心三錢桑葉三錢荷葉三錢石斛三錢玉竹三錢甘草一錢水二碗煎取一碗痢愈後多服大補益調胃承氣湯生大黃一錢芒硝二錢甘草一錢水煎二味已成再入茫硝二沸取服得快利即止桃花湯治虛痢不後重者赤石脂一錢糯米五錢乾薑炒黑一錢久煎成湯服之能溫補止澀為虛滑利之主方不後重下利者乃用之也觀仲景原文自知清胃丸治休息痢生大黃四兩用薄荷拌酒蒸一次去薄荷干後用去糟米酒半斤好燒酒四兩泡二七日在飯上蒸一次再攪一次再曬露再蒸乾再加酒至大黃爛如泥為丸緑豆大每服一錢或五分大便微下則愈烏梅丸治虛滑久痢不後重者烏梅去核十枚黃連三錢黃柏一錢人參一錢桂枝一錢細辛一錢附子一錢當歸一錢花椒一錢乾薑二錢上為末用烏梅飯上蒸熱搗和加蜜為丸梧子大每服三十丸米飲下
